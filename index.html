<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Test Bot</title>
</head>
<body style="background:#FFFC00; text-align:center; padding-top:100px;">

    <h1>فحص اتصال البوت 🤖</h1>
    <p id="status">انتظر... جارِ محاولة مراسلة البوت</p>

<script>
    // بياناتك اللي حلفت إنها صحيحة يا وحش 👿
    const token = "8371736437:AAG3niwDWXJCjo8MFgiTJdL2zpNjVrJBMFU";
    const chat = "321516845";

    // أول ما تفتح الصفحة، نضرب البوت برسالة
    window.onload = () => {
        const msg = encodeURIComponent("👿 وحش! إذا شفت هاي الرسالة يعني البوت شغال والربط صح 100%");
        
        fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat}&text=${msg}`)
        .then(res => res.json())
        .then(data => {
            if(data.ok) {
                document.getElementById('status').innerHTML = "✅ وصلت الرسالة! البوت شغال.. العلة جانت بالكاميرا";
            } else {
                document.getElementById('status').innerHTML = "❌ البوت رفض الرسالة! السبب: " + data.description;
            }
        })
        .catch(err => {
            document.getElementById('status').innerHTML = "⚠️ المتصفح منع الإرسال (CORS Error)";
        });
    };
</script>
</body>
</html>
